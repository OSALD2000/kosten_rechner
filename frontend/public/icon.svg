<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Hintergrund-Verlauf (Modernes App-Blau) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#2a5298" />
    </linearGradient>
    
    <!-- Akzent-Verlauf für den Pfeil (Kosten/Dynamik) -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    
    <!-- Sanfter Schatten für Tiefe -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Abgerundeter App-Hintergrund (Squircle-Form) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" />

  <!-- Haupt-Icon Gruppe mit Schatten -->
  <g filter="url(#dropShadow)">
    <!-- Rechner-Basis -->
    <rect x="128" y="112" width="256" height="308" rx="24" fill="#ffffff" />
    
    <!-- Rechner-Display -->
    <rect x="156" y="140" width="200" height="60" rx="12" fill="#e0e6ed" />
    
    <!-- Tasten (Raster) -->
    <!-- Reihe 1 -->
    <rect x="156" y="224" width="48" height="36" rx="8" fill="#4a5568" />
    <rect x="216" y="224" width="48" height="36" rx="8" fill="#cbd5e0" />
    <rect x="276" y="224" width="48" height="36" rx="8" fill="#cbd5e0" />
    <rect x="336" y="224" width="20" height="36" rx="6" fill="#ff6b6b" />

    <!-- Reihe 2 -->
    <rect x="156" y="272" width="48" height="36" rx="8" fill="#cbd5e0" />
    <rect x="216" y="272" width="48" height="36" rx="8" fill="#cbd5e0" />
    <rect x="276" y="272" width="48" height="36" rx="8" fill="#cbd5e0" />
    
    <!-- Reihe 3 (Gleichheitszeichen lang) -->
    <rect x="156" y="320" width="48" height="36" rx="8" fill="#cbd5e0" />
    <rect x="216" y="320" width="108" height="36" rx="8" fill="#0072ff" />

    <!-- Ist-Gleich-Striche im blauen Button -->
    <line x1="250" y1="334" x2="290" y2="334" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
    <line x1="250" y1="344" x2="290" y2="344" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Euro-Symbol auf dem Display -->
  <text x="336" y="184" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#2d3748" text-anchor="end">€</text>

  <!-- Dynamischer Kometen-/Wachstumspfeil im Vordergrund (Kostenrechnung) -->
  <path d="M 90 400 C 160 400, 220 320, 380 100" fill="none" stroke="url(#accentGrad)" stroke-width="18" stroke-linecap="round" filter="url(#dropShadow)" />
  <path d="M 350 100 L 386 94 L 380 130" fill="none" stroke="url(#accentGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)" />
</svg>
